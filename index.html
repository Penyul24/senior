<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Community</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.hero video,
.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(60%);
}

.overlay{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    margin-bottom:20px;
}

.title{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    font-size:18px;
    opacity:0.9;
    margin-bottom:25px;
}

.stats{
    display:flex;
    gap:40px;
    margin-bottom:35px;
}

.stat h2{
    font-size:34px;
}

.join-btn{
    background:#22c55e;
    color:white;
    text-decoration:none;
    padding:18px 50px;
    border-radius:50px;
    font-size:22px;
    font-weight:bold;
    transition:0.3s;
}

.join-btn:hover{
    transform:scale(1.05);
}

.note{
    margin-top:25px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>
<body>

<div class="hero">

    <!-- Ganti jadi video/mp4 -->
    <img src="background.jpg" alt="bg">

    <div class="overlay">

        <div class="logo">👥</div>

        <div class="title">Private Girls Community</div>

        <div class="desc">
            Join thousands of active members online now
        </div>

        <div class="stats">
            <div class="stat">
                <h2>130K</h2>
                <p>Members</p>
            </div>

            <div class="stat">
                <h2>50K</h2>
                <p>Online</p>
            </div>
        </div>

        <a class="join-btn"
           href="https://llqkol.conecttonline.com/?utm_source=da57dc555e50572d&ban=fb&j1=1&s1=217823&s2=2207990&s3=Bol&s5=Bol&click_id=Bol">
           Join Now
        </a>

        <div class="note">
            Secure private community access
        </div>

    </div>

</div>

</body>
</html>
