<!DOCTYPE html>
<html>
<head>
  <title>New Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#ece5dd; margin:0; padding:0;">

<div style="max-width:400px; margin:auto; background:#fff; min-height:100vh;">

  <!-- Header -->
  <div style="background:#075e54; color:#fff; padding:15px; font-size:18px;">
    💬 New Message
  </div>

  <!-- Chat -->
  <div style="padding:15px;">

    <div style="margin-bottom:10px;">
      <img src="https://i.imgur.com/yourimage.jpg" 
      style="width:40px; height:40px; border-radius:50%; vertical-align:middle;">
      <span style="margin-left:10px; font-weight:bold;">Emily, 42</span>
    </div>

    <!-- Message 1 -->
    <div style="background:#dcf8c6; padding:10px; border-radius:10px; 
    max-width:70%; margin-bottom:10px;">
      Hey... are you nearby? 🙂
    </div>

    <!-- Message 2 -->
    <div style="background:#dcf8c6; padding:10px; border-radius:10px; 
    max-width:70%; margin-bottom:10px;">
      I saw your profile and got curious...
    </div>

    <!-- Typing -->
    <div id="typing" style="display:none; background:#fff; padding:10px; 
    border-radius:10px; max-width:60%; color:#999;">
      typing<span id="dots">.</span>
    </div>

  </div>

  <!-- CTA -->
  <div style="text-align:center; padding:20px;">
    <a href="https://chhijhf.hubsmartt.com/s/9a24608a59183?track=abs" 
    style="background:#25d366; color:#fff; padding:15px 25px; 
    text-decoration:none; font-size:18px; border-radius:8px;">
      Reply Now
    </a>
  </div>

</div>

<script>
// muncul typing setelah 2 detik
setTimeout(function(){
  document.getElementById("typing").style.display = "block";
}, 2000);

// animasi titik typing
let dots = document.getElementById("dots");
let count = 1;

setInterval(function(){
  count++;
  if(count > 3) count = 1;
  dots.innerHTML = ".".repeat(count);
}, 500);
</script>

</body>
</html>
