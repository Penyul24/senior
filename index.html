<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Verification</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#db72df;
    text-align:center;
}

.container{
    padding:40px 20px;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
    margin-top:20px;
}

h1{
    font-size:42px;
    color:#000;
    margin-top:30px;
    margin-bottom:15px;
    font-weight:800;
}

p{
    font-size:22px;
    color:#222;
    line-height:1.5;
    max-width:700px;
    margin:auto;
}

.btn{
    display:block;
    width:90%;
    max-width:700px;
    margin:45px auto;
    background:white;
    color:black;
    text-decoration:none;
    font-size:30px;
    font-weight:bold;
    padding:24px;
    border-radius:50px;
    border:4px solid black;
    box-shadow:8px 8px 0px black;
    transition:0.2s;
}

.btn:active{
    transform:translateY(3px);
    box-shadow:4px 4px 0px black;
}

.icon{
    vertical-align:middle;
    margin-right:10px;
}

@media(max-width:600px){

h1{
    font-size:26px;
}

p{
    font-size:16px;
}

.btn{
    font-size:22px;
    padding:18px;
}
}
</style>
</head>

</html>
